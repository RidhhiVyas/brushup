<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e1014">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brushup">
<meta name="description" content="Brushup — brush up a skill in minutes a day.">
<title>Brushup — brush up in minutes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Spline+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1014; --bg2:#161922; --card:#1a1e29; --card2:#222736;
    --ink:#f1f3f7; --muted:#8b90a3; --line:#2a2f3e;
    --accent:#5eead4; --accent2:#60a5fa; --good:#4ade80; --bad:#f87171;
    --display:'Fraunces',Georgia,serif; --body:'Spline Sans',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overscroll-behavior:none}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--body);
    background-image:radial-gradient(120% 80% at 85% -10%, rgba(96,165,250,.10), transparent 55%),
                     radial-gradient(100% 70% at 0% 110%, rgba(94,234,212,.08), transparent 50%);
    display:flex;justify-content:center;min-height:100%;
  }
  .app{width:100%;max-width:480px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);position:relative}
  header{padding:22px 22px 10px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--display);font-weight:700;font-size:26px;letter-spacing:-.02em;display:flex;align-items:center;gap:9px}
  .logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;color:#0b1f1c;font-size:18px;font-weight:700}
  .streak{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
    padding:7px 13px;border-radius:999px;font-weight:600;font-size:14px}
  .streak span{font-size:16px}
  main{flex:1;padding:6px 22px 26px;overflow-y:auto}
  .hello{font-family:var(--display);font-size:30px;line-height:1.1;font-weight:600;margin:10px 0 4px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:15px;margin-bottom:22px}
  .sectlabel{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:26px 2px 12px;font-weight:600}
  .topic{display:flex;align-items:center;gap:15px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .topic:active{transform:scale(.985)}
  .topic .ico{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:24px;flex-shrink:0}
  .topic h3{font-size:16px;font-weight:600;margin-bottom:3px}
  .topic p{font-size:13px;color:var(--muted)}
  .bar{height:5px;background:var(--card2);border-radius:9px;margin-top:9px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:9px;transition:.5s}
  .done-badge{position:absolute;top:14px;right:14px;color:var(--good);font-size:13px;font-weight:600}

  /* lesson view */
  .lesson{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;flex-direction:column;
    max-width:480px;margin:0 auto;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .lesson.open{display:flex}
  .ltop{padding:18px 20px 8px;display:flex;align-items:center;gap:14px}
  .x{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;line-height:1;padding:4px}
  .prog{flex:1;height:6px;background:var(--card2);border-radius:9px;overflow:hidden}
  .prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.35s}
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 26px 26px;position:relative}
  .card-anim{animation:rise .42s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
  .ctitle{font-family:var(--display);font-size:30px;line-height:1.12;font-weight:600;letter-spacing:-.02em;margin-bottom:16px}
  .ctext{font-size:18px;line-height:1.55;color:#dfe2ea}
  .ctext em{color:var(--accent);font-style:normal;font-weight:600}
  .q{font-family:var(--display);font-size:24px;line-height:1.2;font-weight:600;margin-bottom:22px}
  .opt{display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);
    color:var(--ink);padding:16px 18px;border-radius:15px;margin-bottom:11px;font-size:16px;font-family:var(--body);
    cursor:pointer;transition:.16s}
  .opt:active{transform:scale(.99)}
  .opt.correct{border-color:var(--good);background:rgba(74,222,128,.12)}
  .opt.wrong{border-color:var(--bad);background:rgba(248,113,113,.12)}
  .opt:disabled{cursor:default}
  .feedback{font-size:15px;line-height:1.5;margin-top:6px;padding:14px 16px;border-radius:13px;display:none}
  .feedback.show{display:block;animation:rise .3s}
  .feedback.ok{background:rgba(74,222,128,.1);color:#bff0cf}
  .feedback.no{background:rgba(248,113,113,.1);color:#f6c9c9}
  .lbot{padding:14px 26px calc(20px + env(safe-area-inset-bottom))}
  .btn{width:100%;background:var(--accent);color:#06231f;border:none;padding:17px;border-radius:15px;
    font-size:17px;font-weight:700;font-family:var(--body);cursor:pointer;transition:.16s}
  .btn:active{transform:scale(.985)}
  .btn:disabled{opacity:.35;cursor:default}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}

  /* finish */
  .finish{text-align:center;padding:20px}
  .finish .big{font-size:64px;margin-bottom:8px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .finish h2{font-family:var(--display);font-size:30px;font-weight:700;margin-bottom:8px}
  .finish p{color:var(--muted);font-size:16px;margin-bottom:6px}
  .score{font-size:18px;font-weight:600;color:var(--accent);margin-bottom:24px}

  .install{margin:18px 2px 0;background:linear-gradient(135deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:16px;padding:16px;font-size:14px;color:var(--muted);display:none}
  .install.show{display:block}
  .install b{color:var(--ink)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:18px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span class="mark">B</span>Brushup</div>
    <div class="streak"><span>🔥</span><b id="streakNum">0</b></div>
  </header>
  <main id="home">
    <div class="hello" id="hello">Ready to brush up?</div>
    <div class="sub">A few minutes a day. Pick a topic to begin.</div>
    <div class="sectlabel">Topics</div>
    <div id="topicList"></div>
    <div class="install" id="installCard">
      📲 <b>Install Brushup</b> — on iPhone tap Share → <b>Add to Home Screen</b>. On Android tap the menu → <b>Install app</b>. It then opens like a normal app, fully offline.
    </div>
    <footer>Your progress is saved on this device only.</footer>
  </main>
</div>

<!-- Lesson player -->
<div class="lesson" id="lesson">
  <div class="ltop">
    <button class="x" id="closeBtn">×</button>
    <div class="prog"><i id="progBar"></i></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="lbot"><button class="btn" id="nextBtn">Continue</button></div>
</div>

<script>
/* ---------- CONTENT: add your own lessons here ---------- */
const TOPICS = [
  { id:"money", title:"Money Basics", desc:"Smarter habits with cash", icon:"💰", color:"#5eead4",
    cards:[
      {type:"read",kicker:"Lesson 1",title:"Pay yourself first",text:"Before spending on anything else, move a fixed slice of income into savings. Treat it like a <em>bill you owe future-you</em>. Even 10% compounds into real money over time."},
      {type:"read",kicker:"Lesson 1",title:"The 50/30/20 rule",text:"A simple budget: <em>50%</em> on needs, <em>30%</em> on wants, <em>20%</em> on savings & debt. It's a starting frame you bend to your life — not a law."},
      {type:"quiz",q:"In the 50/30/20 rule, what does the 20% go toward?",options:["Rent and food","Savings and paying off debt","Entertainment","Taxes"],answer:1,explain:"The 20% is for building savings and clearing debt — the part that grows your future."},
      {type:"read",kicker:"Lesson 1",title:"Emergency fund",text:"Aim for <em>3–6 months</em> of essential expenses in an easy-to-reach account. It turns a crisis into an inconvenience."},
      {type:"quiz",q:"Roughly how large should an emergency fund be?",options:["1 week of pay","3–6 months of essential expenses","A full year's salary","Whatever's left over"],answer:1,explain:"3–6 months of essentials is the common target — enough cushion without locking away too much."}
    ]},
  { id:"focus", title:"Focus & Habits", desc:"Build a daily routine", icon:"🎯", color:"#60a5fa",
    cards:[
      {type:"read",kicker:"Lesson 1",title:"Make it tiny",text:"New habits stick when they're <em>almost too small to fail</em>. Want to read more? Start with one page. The win is showing up, not the size."},
      {type:"read",kicker:"Lesson 1",title:"Habit stacking",text:"Attach a new habit to one you already do: <em>“After I pour my coffee, I write one line in my journal.”</em> The old habit becomes the reminder."},
      {type:"quiz",q:"What's the core idea of habit stacking?",options:["Do many habits at once","Anchor a new habit to an existing one","Reward yourself with food","Only build habits on weekends"],answer:1,explain:"You link the new habit to something you already do reliably, so the trigger is built in."},
      {type:"read",kicker:"Lesson 1",title:"The 2-minute rule",text:"Scale any habit down to a 2-minute version to start. <em>“Read before bed”</em> becomes <em>“read one page.”</em> Starting is the hard part; momentum does the rest."},
      {type:"quiz",q:"Why start with a 2-minute version of a habit?",options:["It guarantees mastery","It lowers the barrier so you actually begin","It's a legal requirement","Longer is always worse"],answer:1,explain:"Lowering the starting effort beats motivation — once you begin, continuing is easy."}
    ]},
  { id:"mind", title:"Mind & Calm", desc:"Stress, sleep, attention", icon:"🧠", color:"#a78bfa",
    cards:[
      {type:"read",kicker:"Lesson 1",title:"Box breathing",text:"Breathe in for 4, hold 4, out 4, hold 4. A few rounds nudge your nervous system toward <em>calm</em>. Used by athletes and first responders alike."},
      {type:"read",kicker:"Lesson 1",title:"Sleep is a skill",text:"Same wake time every day — even weekends — anchors your body clock. <em>Consistency</em> beats the occasional long lie-in."},
      {type:"quiz",q:"What most reliably stabilises your sleep rhythm?",options:["Sleeping in on weekends","A consistent wake-up time daily","Naps after 5pm","Caffeine at night"],answer:1,explain:"A steady wake time is the strongest anchor for a healthy body clock."},
      {type:"read",kicker:"Lesson 1",title:"Single-task",text:"“Multitasking” is really fast switching, and each switch has a <em>cost</em>. Doing one thing fully is faster and far less draining."},
      {type:"quiz",q:"Why is multitasking often inefficient?",options:["Brains can't switch at all","Each task-switch carries a mental cost","It's banned in most jobs","It uses more electricity"],answer:1,explain:"Switching between tasks burns attention and time — focused single-tasking wins."}
    ]},
  { id:"comm", title:"Communication", desc:"Speak & write clearly", icon:"💬", color:"#f0abfc",
    cards:[
      {type:"read",kicker:"Lesson 1",title:"Lead with the point",text:"Say your conclusion <em>first</em>, then support it. Busy listeners get the message even if they only hear the opening line."},
      {type:"read",kicker:"Lesson 1",title:"The power of the pause",text:"A short silence before answering reads as <em>thoughtful</em>, not slow. It also kills filler words like “um.”"},
      {type:"quiz",q:"What's a benefit of pausing before you answer?",options:["It fills time","It seems thoughtful and cuts filler words","It confuses the listener","It's considered rude"],answer:1,explain:"A deliberate pause signals composure and reduces nervous filler."},
      {type:"read",kicker:"Lesson 1",title:"Cut the qualifiers",text:"Words like <em>“just,” “maybe,” “I think”</em> can shrink your message. Drop them when you mean it: “I recommend X,” not “I just think maybe X.”"},
      {type:"quiz",q:"Why trim words like 'just' and 'maybe'?",options:["They're misspelled","They can weaken an otherwise clear point","Grammar rules forbid them","They cost extra characters"],answer:1,explain:"Hedging words dilute confidence — remove them when you actually mean what you say."}
    ]}
];

/* ---------- STORAGE (in-memory; persisted via localStorage when available) ---------- */
const store = (()=>{
  let mem={};
  const has=(()=>{try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true}catch(e){return false}})();
  return {
    get(k,d){ try{ const v=has?localStorage.getItem(k):mem[k]; return v==null?d:JSON.parse(v) }catch(e){return d} },
    set(k,v){ const s=JSON.stringify(v); if(has)localStorage.setItem(k,s); else mem[k]=s; }
  };
})();

/* ---------- STREAK ---------- */
function today(){return new Date().toISOString().slice(0,10)}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10)}
function refreshStreak(){
  let s=store.get('streak',{count:0,last:null});
  document.getElementById('streakNum').textContent=s.count;
}
function bumpStreak(){
  let s=store.get('streak',{count:0,last:null});
  if(s.last===today()) return;            // already counted today
  s.count = (s.last===yesterday())? s.count+1 : 1;
  s.last=today(); store.set('streak',s);
  document.getElementById('streakNum').textContent=s.count;
}

/* ---------- HOME ---------- */
function progressOf(t){
  const done=store.get('done_'+t.id,[]);
  return Math.round(done.length / t.cards.length * 100);
}
function renderHome(){
  const h=new Date().getHours();
  document.getElementById('hello').textContent = h<12?"Good morning ☀️":h<18?"Good afternoon 👋":"Good evening 🌙";
  const list=document.getElementById('topicList'); list.innerHTML='';
  TOPICS.forEach(t=>{
    const pct=progressOf(t);
    const el=document.createElement('div'); el.className='topic';
    el.innerHTML=`
      <div class="ico" style="background:${t.color}22;color:${t.color}">${t.icon}</div>
      <div style="flex:1">
        <h3>${t.title}</h3><p>${t.desc}</p>
        <div class="bar"><i style="width:${pct}%"></i></div>
      </div>
      ${pct===100?'<div class="done-badge">✓ Done</div>':''}`;
    el.onclick=()=>openLesson(t);
    list.appendChild(el);
  });
  refreshStreak();
}

/* ---------- LESSON PLAYER ---------- */
let cur=null, idx=0, score=0, answered=false;
const lesson=document.getElementById('lesson'), stage=document.getElementById('stage'),
      progBar=document.getElementById('progBar'), nextBtn=document.getElementById('nextBtn');

function openLesson(t){ cur=t; idx=0; score=0; answered=false; lesson.classList.add('open'); renderCard(); }
function closeLesson(){ lesson.classList.remove('open'); renderHome(); }

function renderCard(){
  const total=cur.cards.length;
  progBar.style.width=(idx/total*100)+'%';
  const c=cur.cards[idx]; answered=false;
  stage.className='stage';
  if(c.type==='read'){
    stage.innerHTML=`<div class="card-anim">
      <div class="kicker">${c.kicker||''}</div>
      <div class="ctitle">${c.title}</div>
      <div class="ctext">${c.text}</div></div>`;
    nextBtn.textContent= idx===total-1?'Finish':'Continue';
    nextBtn.disabled=false;
    nextBtn.onclick=advance;
  } else { // quiz
    stage.innerHTML=`<div class="card-anim">
      <div class="kicker">Quick check</div>
      <div class="q">${c.q}</div>
      <div id="opts"></div>
      <div class="feedback" id="fb"></div></div>`;
    const opts=document.getElementById('opts');
    c.options.forEach((o,i)=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=o;
      b.onclick=()=>pick(i,c,b); opts.appendChild(b);
    });
    nextBtn.textContent='Continue'; nextBtn.disabled=true; nextBtn.onclick=advance;
  }
}
function pick(i,c,btn){
  if(answered) return; answered=true;
  const all=[...document.querySelectorAll('.opt')];
  all.forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  if(i===c.answer){
    btn.classList.add('correct'); score++;
    fb.className='feedback ok show'; fb.textContent='✓ '+c.explain;
  } else {
    btn.classList.add('wrong'); all[c.answer].classList.add('correct');
    fb.className='feedback no show'; fb.textContent='✗ '+c.explain;
  }
  nextBtn.disabled=false;
}
function advance(){
  if(idx<cur.cards.length-1){ idx++; renderCard(); }
  else finish();
}
function finish(){
  progBar.style.width='100%';
  store.set('done_'+cur.id, cur.cards.map((_,i)=>i));
  bumpStreak();
  const quizzes=cur.cards.filter(c=>c.type==='quiz').length;
  stage.className='stage';
  stage.innerHTML=`<div class="finish card-anim">
      <div class="big">🎉</div>
      <h2>Nicely brushed up!</h2>
      <p>You finished <b>${cur.title}</b>.</p>
      <div class="score">${score} / ${quizzes} correct</div>
    </div>`;
  nextBtn.textContent='Back to topics'; nextBtn.disabled=false; nextBtn.onclick=closeLesson;
}
document.getElementById('closeBtn').onclick=closeLesson;

/* ---------- INSTALL HINT ---------- */
(function(){
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if(!standalone) document.getElementById('installCard').classList.add('show');
})();

/* ---------- PWA: register an inline service worker for offline use ---------- */
if('serviceWorker' in navigator){
  const swCode = `
    const C='brushup-v1';
    self.addEventListener('install',e=>self.skipWaiting());
    self.addEventListener('activate',e=>self.clients.claim());
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.open(C).then(c=>c.match(e.request).then(r=> r || fetch(e.request).then(net=>{
          if(e.request.method==='GET' && net.ok && e.request.url.startsWith('http')) c.put(e.request,net.clone());
          return net;
        }).catch(()=>r)))
      );
    });`;
  const blob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
/* inline web app manifest so it's installable from one file */
(function(){
  const icon = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset="1" stop-color="#60a5fa"/></linearGradient></defs><rect width="512" height="512" rx="110" fill="#0e1014"/><text x="50%" y="55%" font-size="300" text-anchor="middle" dominant-baseline="middle" fill="url(#g)" font-family="Georgia,serif" font-weight="700">B</text></svg>');
  const man={name:"Brushup",short_name:"Brushup",start_url:".",display:"standalone",
    background_color:"#0e1014",theme_color:"#0e1014",
    icons:[{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
  const url=URL.createObjectURL(new Blob([JSON.stringify(man)],{type:'application/manifest+json'}));
  const l=document.createElement('link'); l.rel='manifest'; l.href=url; document.head.appendChild(l);
  const al=document.createElement('link'); al.rel='apple-touch-icon'; al.href=icon; document.head.appendChild(al);
})();

renderHome();
</script>
</body>
</html>
